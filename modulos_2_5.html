<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Curso Interactivo - Entrevista Motivacional (Módulos 2-5)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);

        }
        h1 {
            font-size: 26px;
            color: #0b2b4a;
            border-left: 6px solid #2a7de1;
            padding-left: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .subhead {
            color: #3d5a73;
            font-size: 15px;
            margin-bottom: 25px;
            padding-left: 24px;

            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }
        .modulo-tabs button {
            background: #eef3fa;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            color: #1f3a57;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 0 auto;
        }
        .modulo-tabs button.activo {
            background: #1a5fb0;

        }
        .modulo-tabs button:hover:not(.activo) { background: #dbe3ed; }

            background: #f9fcff;
            border-radius: 24px;
            padding: 22px 25px 25px;
            margin-bottom: 20px;
            border: 1px solid #dee9f2;
        }
        .pregunta-texto {
            font-size: 19px;
            font-weight: 500;
            color: #0a1e30;
            margin-bottom: 18px;
            line-height: 1.4;
        }
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opcion {
            background: white;
            border: 2px solid #d8e2ef;
            border-radius: 16px;
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.12s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .opcion:hover { background: #edf4fc; border-color: #a0bcdb; }
        .opcion.seleccionada { border-color: #1a5fb0; background: #e4edfa; }
        .opcion.correcta { border-color: #1e8b4c; background: #dff0e6; }
        .opcion.incorrecta { border-color: #c73a3a; background: #fce8e8; }
        .opcion .letra { font-weight: 700; color: #2b4b6e; width: 24px; }
        .feedback {
            margin-top: 18px;
            padding: 14px 18px;
            border-radius: 16px;
            background: #eef6fd;
            border-left: 6px solid #2a7de1;
            font-size: 15px;
            line-height: 1.5;
            display: none;
        }
        .feedback.mostrar { display: block; }
        .feedback.acierto { border-left-color: #1e8b4c; background: #e3f3e9; }
        .feedback.fallo { border-left-color: #c73a3a; background: #fceded; }
        .controles {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            background: #e3eaf3;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: #1f3a57;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn.primario { background: #1a5fb0; color: white; box-shadow: 0 4px 8px rgba(26,95,176,0.2); }
        .btn.primario:hover { background: #124a8a; transform: scale(1.02); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .progreso {
            font-size: 14px;
            color: #2f557a;
            background: #e6eefa;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        .finalizado {
            background: #d9f0e1;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            color: #0b3d24;
            font-size: 18px;
            font-weight: 500;
        }
        .finalizado span { font-size: 40px; display: block; margin-bottom: 8px; }
        .oculto { display: none; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 22px; }
            .pregunta-texto { font-size: 17px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🧠 Entrevista Motivacional</h1>

    <div class="modulo-tabs" id="tabContainer">

    <div id="preguntasContainer"></div>

    <!-- Controles -->
    <div class="controles">
        <button class="btn" id="btnAnterior" disabled>◀ Anterior</button>

        <button class="btn primario" id="btnSiguiente">Siguiente ▶</button>
    </div>
    <div style="margin-top: 18px; text-align: center; font-size: 13px; color: #5f7e9c;">
        ✅ Responde cada pregunta y recibe retroalimentación inmediata
    </div>
</div>

<script>
    // ------------------------------------------------------------
    //  CONTENIDO: MÓDULOS 2, 3, 4 y 5 (20 preguntas total)
    // ------------------------------------------------------------
    const MODULOS = {

                {
                    pregunta: "¿Cuál es el espíritu fundamental de la Entrevista Motivacional?",

                        "B) Colaboración, evocación y autonomía",
                        "C) Diagnóstico y prescripción",
                        "D) Evaluación y juicio"
                    ],
                    correcta: 1,
                    explicacion: "El espíritu de la EM se basa en la colaboración (no confrontación), evocar las propias razones del paciente y respetar su autonomía."
                },
                {
                    pregunta: "En la EM, ¿qué significa 'aceptación' como principio?",
                    opciones: [
                        "A) Aceptar todas las conductas del paciente sin excepción",
                        "B) Reconocer el valor y potencial de la persona, incluso si no se aprueban sus acciones",
                        "C) Estar de acuerdo con todo lo que dice el paciente",
                        "D) Ignorar las conductas de riesgo"
                    ],
                    correcta: 1,
                    explicacion: "Aceptación implica valorar a la persona, tener empatía, afirmar su autonomía y buscar su bienestar, sin juzgar."
                },
                {
                    pregunta: "La 'discrepancia' en la EM se refiere a:",
                    opciones: [
                        "A) La diferencia entre el terapeuta y el paciente",
                        "B) El conflicto entre la conducta actual y los valores/metas personales",
                        "C) La falta de información sobre el problema",
                        "D) El desacuerdo entre dos profesionales"
                    ],
                    correcta: 1,
                    explicacion: "La discrepancia es el motor del cambio: el paciente nota la brecha entre cómo está y cómo quiere estar."
                },
                {
                    pregunta: "¿Qué rol asume el entrevistador en la EM?",
                    opciones: [
                        "A) Experto que da soluciones",
                        "B) Guía que acompaña y facilita, sin imponer",
                        "C) Juez que evalúa el progreso",
                        "D) Amigo que opina sobre la vida del paciente"
                    ],
                    correcta: 1,
                    explicacion: "El entrevistador es un facilitador que ayuda al paciente a explorar y resolver su ambivalencia."
                },
                {
                    pregunta: "La autonomía en la EM implica:",
                    opciones: [
                        "A) Que el paciente debe seguir las indicaciones del terapeuta",
                        "B) Que el paciente es responsable de elegir su camino de cambio",
                        "C) Que el terapeuta toma decisiones por el paciente",
                        "D) Que no hay necesidad de apoyo"
                    ],
                    correcta: 1,
                    explicacion: "Se respeta la capacidad del paciente para tomar decisiones informadas sobre su vida."
                }
            ]
        },
        3: {
            nombre: "Habilidades básicas (OARS)",
            preguntas: [
                {
                    pregunta: "En OARS, la 'R' significa:",
                    opciones: [
                        "A) Refuerzo",
                        "B) Reflexión",
                        "C) Razonamiento",
                        "D) Reconocimiento"
                    ],
                    correcta: 1,
                    explicacion: "OARS: Open questions, Affirmations, Reflections, Summaries (preguntas abiertas, afirmaciones, reflexiones, resúmenes)."
                },
                {
                    pregunta: "¿Cuál es un ejemplo de pregunta abierta?",
                    opciones: [
                        "A) ¿Fuma usted?",
                        "B) ¿Qué piensa sobre su consumo de alcohol?",
                        "C) ¿Cuántos cigarrillos fuma al día?",
                        "D) ¿Tiene intención de dejar de fumar?"
                    ],
                    correcta: 1,
                    explicacion: "Las preguntas abiertas invitan a la reflexión y no se responden con un sí/no. Ej: '¿Cómo te sientes con...?'"
                },
                {
                    pregunta: "Una 'afirmación' en la EM debe ser:",
                    opciones: [
                        "A) Un elogio vacío y genérico",
                        "B) Un reconocimiento genuino de un esfuerzo o fortaleza",
                        "C) Una crítica constructiva",
                        "D) Una orden disfrazada de halago"
                    ],
                    correcta: 1,
                    explicacion: "Las afirmaciones refuerzan aspectos positivos y fortalecen la autoeficacia del paciente."
                },
                {
                    pregunta: "La reflexión simple en OARS consiste en:",
                    opciones: [
                        "A) Repetir exactamente lo que dijo el paciente",
                        "B) Devolver el contenido con un ligero reformulado, sin añadir interpretación",
                        "C) Hacer un resumen extenso de todo lo hablado",
                        "D) Cuestionar lo que el paciente acaba de decir"
                    ],
                    correcta: 1,
                    explicacion: "La reflexión simple es como un espejo: devuelves lo dicho para confirmar comprensión y fomentar la exploración."
                },
                {
                    pregunta: "Los resúmenes (Summaries) sirven para:",
                    opciones: [
                        "A) Terminar la sesión rápidamente",
                        "B) Organizar la información, conectar ideas y dar continuidad",
                        "C) Evaluar al paciente",
                        "D) Dar consejos finales"
                    ],
                    correcta: 1,
                    explicacion: "Los resúmenes ayudan a clarificar, enfocar y transitar entre temas, mostrando escucha activa."
                }
            ]
        },
        4: {
            nombre: "Proceso de cambio y ambivalencia",
            preguntas: [
                {
                    pregunta: "¿Cuál es el primer paso para manejar la ambivalencia en la EM?",
                    opciones: [
                        "A) Minimizar el problema",
                        "B) Normalizar la ambivalencia y explorar ambos lados",
                        "C) Decidir por el paciente",
                        "D) Ignorar los argumentos en contra del cambio"
                    ],
                    correcta: 1,
                    explicacion: "La ambivalencia es normal; se explora sin juzgar, usando la balanza decisional o el diálogo interno."
                },
                {
                    pregunta: "El 'lenguaje de cambio' se refiere a:",
                    opciones: [
                        "A) Frases que el terapeuta usa para motivar",
                        "B) Declaraciones del paciente que expresan deseo, capacidad o compromiso con el cambio",
                        "C) Un idioma extranjero utilizado en terapia",
                        "D) El tono de voz del entrevistador"
                    ],
                    correcta: 1,
                    explicacion: "El lenguaje de cambio (ej. 'quiero', 'voy a', 'puedo') es un predictor clave del resultado positivo."
                },
                {
                    pregunta: "¿Qué técnica ayuda a resolver la ambivalencia?",
                    opciones: [
                        "A) La confrontación directa",
                        "B) La balanza decisional (pros y contras del cambio y de mantener la conducta)",
                        "C) La persuasión racional",
                        "D) El castigo simbólico"
                    ],
                    correcta: 1,
                    explicacion: "La balanza permite al paciente ver ambos lados y tomar conciencia, sin presión externa."
                },
                {
                    pregunta: "La 'rueda del cambio' (Prochaska) en la EM se usa para:",
                    opciones: [
                        "A) Clasificar a los pacientes en etapas rígidas",
                        "B) Entender que el cambio es un proceso no lineal y adaptar la intervención",

                        "D) Diagnosticar trastornos"
                    ],
                    correcta: 1,
                    explicacion: "Ayuda a identificar en qué etapa está el paciente y ajustar el enfoque (precontemplación, contemplación, acción, etc.)."
                },
                {
                    pregunta: "Cuando un paciente dice 'No creo que pueda cambiar', la respuesta EM adecuada es:",
                    opciones: [
                        "A) 'Tienes razón, es difícil'",
                        "B) '¿Qué te hace pensar que no podrías?', explorando su percepción",
                        "C) 'Claro que puedes, solo esfuérzate más'",
                        "D) 'Entonces no tiene sentido seguir'"
                    ],
                    correcta: 1,
                    explicacion: "Se explora la duda con curiosidad, sin confrontar, para movilizar recursos internos."
                }
            ]
        },
        5: {
            nombre: "Planificación y consolidación del cambio",
            preguntas: [
                {
                    pregunta: "En la fase de planificación, el terapeuta debe:",
                    opciones: [
                        "A) Diseñar un plan detallado sin consultar al paciente",
                        "B) Colaborar con el paciente para que él mismo proponga pasos concretos",
                        "C) Decidir las metas del paciente",
                        "D) Evaluar si el paciente merece el cambio"
                    ],
                    correcta: 1,
                    explicacion: "La planificación es colaborativa: el paciente es el experto en su vida, el terapeuta facilita el proceso."
                },
                {
                    pregunta: "¿Qué es una 'meta SMART' en el contexto de la EM?",
                    opciones: [
                        "A) Una meta vaga y general",
                        "B) Específica, medible, alcanzable, relevante y con tiempo definido",
                        "C) Una meta impuesta por el terapeuta",
                        "D) Un objetivo sin plazos"
                    ],
                    correcta: 1,
                    explicacion: "SMART ayuda a que las metas sean claras y realistas, aumentando la probabilidad de éxito."
                },
                {
                    pregunta: "El 'contrato de cambio' en la EM es:",
                    opciones: [
                        "A) Un documento legal que obliga al paciente",
                        "B) Un acuerdo verbal o escrito donde el paciente establece su compromiso y pasos",
                        "C) Una prueba de que el terapeuta es responsable",
                        "D) Un formulario para cobrar honorarios"

                    correcta: 1,
                    explicacion: "Es un compromiso autogenerado que refuerza la responsabilidad personal."
                },
                {
                    pregunta: "¿Cómo se manejan las recaídas en la EM?",
                    opciones: [
                        "A) Como un fracaso total que invalida el progreso",
                        "B) Como una oportunidad de aprendizaje y refuerzo de la autoeficacia",
                        "C) Castigando al paciente",
                        "D) Terminando la terapia"
                    ],
                    correcta: 1,
                    explicacion: "La recaída es parte del proceso; se explora sin culpa y se ajusta el plan."
                },
                {
                    pregunta: "Al finalizar el módulo 5, el paciente debería sentirse:",
                    opciones: [
                        "A) Dependiente del terapeuta para cualquier decisión",
                        "B) Con mayor confianza en su capacidad para gestionar su cambio",
                        "C) Presionado para mantener resultados perfectos",
                        "D) Confundido sobre lo aprendido"
                    ],
                    correcta: 1,
                    explicacion: "El objetivo es fortalecer la autoeficacia y la autonomía para mantener el cambio a largo plazo."
                }
            ]
        }

    // ------------------------------------------------------------
    //  LÓGICA DE LA APLICACIÓN
    // ------------------------------------------------------------
    const app = {
        moduloActual: 2,
        preguntaActual: 0,
        respuestas: {},    // guarda índice seleccionado por pregunta (key: "mod-preg")
        totalPreguntas: 0,
        preguntasMap: [],  // array plano de objetos {mod, idx, preguntaObj}

        init() {
            // Construir mapa plano de todas las preguntas
            for (let m = 2; m <= 5; m++) {
                const mod = MODULOS[m];
                if (!mod) continue;
                mod.preguntas.f
