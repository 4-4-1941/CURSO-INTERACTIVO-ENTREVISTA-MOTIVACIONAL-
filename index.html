<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM · Curso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f4f8;padding:20px;max-width:800px;margin:0 auto}
h1{color:#1B2B6B;border-left:5px solid #C8960A;padding-left:15px}
.sub{color:#4a5b7a;margin:8px 0 25px 0}
.modulo{background:#fff;border-radius:12px;padding:18px 22px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer}
.modulo h2{color:#1B2B6B;font-size:1.2rem}
.modulo p{color:#555;margin:6px 0 0 0}
.badge{display:inline-block;padding:2px 14px;border-radius:20px;font-size:0.75rem;font-weight:bold;color:#fff;background:#C8960A;margin-bottom:8px}
.unidades{display:none;margin-top:14px;padding-top:14px;border-top:2px solid #eef2f7}
.unidades.abierto{display:block}
.unidad{background:#f8fafc;border-radius:8px;padding:12px 16px;margin:6px 0;border-left:3px solid #2A3F8F}
.unidad h4{color:#1B2B6B}
.unidad p{color:#666;margin:4px 0 0 0;font-size:0.85rem}
</style>
</head>
<body>
<h1>🎯 Entrevista Motivacional</h1>
<p class="sub">Toca un módulo para ver sus unidades</p>
<div id="contenedor"></div>
<script>
const modulos = [
{id:'M1',titulo:'Bases Teóricas y Espíritu de la EM',descripcion:'Historia, PACE, OARS, Evocación',unidades:['Historia y desarrollo','Espíritu PACE','OARS avanzadas','Evocación']},
{id:'M2',titulo:'Procesos Clínicos',descripcion:'Change-talk, Sustain-talk, Planificación, Casos',unidades:['Change-talk','Sustain-talk','Planificación','Casos integradores']},
{id:'M3',titulo:'Aplicación Avanzada',descripcion:'Adolescentes, Atención primaria, Pediatría, Integración',unidades:['EM en adolescentes','Atención primaria','Salud mental pediátrica','Integración']},
{id:'M4',titulo:'Nivel Experto',descripcion:'MITI, Supervisión, Evaluación, Implementación',unidades:['MITI y fidelidad','Supervisión','Evaluación','Implementación']},
{id:'M5',titulo:'Casos y Actividades',descripcion:'Casos resueltos, Banco de actividades',unidades:['Casos resueltos','Banco de actividades']}
];
const c=document.getElementById('contenedor');
for(let m=0;m<modulos.length;m++){const mod=modulos[m];const d=document.createElement('div');d.className='modulo';const b=document.createElement('span');b.className='badge';b.textContent='✓ Desbloqueado';const t=document.createElement('h2');t.textContent=mod.id+' · '+mod.titulo;const p=document.createElement('p');p.textContent=mod.descripcion;const u=document.createElement('div');u.className='unidades';for(let i=0;i<mod.unidades.length;i++){const item=document.createElement('div');item.className='unidad';item.innerHTML='<h4>📘 '+mod.unidades[i]+'</h4><p>Contenido completo de esta unidad.</p>';u.appendChild(item);}d.appendChild(b);d.appendChild(t);d.appendChild(p);d.appendChild(u);d.onclick=function(){const x=this.querySelector('.unidades');if(x.className.indexOf('abierto')>=0){x.className='unidades';}else{x.className='unidades abierto';}};c.appendChild(d);}
</script>
<p style="margin-top:30px;color:#888;font-size:0.85rem;text-align:center">Todos los módulos están desbloqueados. Toca cada uno para ver sus unidades.</p>
</body>
</html>
